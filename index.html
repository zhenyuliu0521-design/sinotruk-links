<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SINOTRUK - Official Links</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #0b3d21; /* 深绿色背景 */
        color: white;
        text-align: center;
    }

    .container {
        max-width: 480px;
        margin: auto;
        padding: 40px 20px;
    }

    .logo {
        width: 140px;
        margin: 20px auto 30px;
    }

    h1 {
        font-size: 26px;
        margin-bottom: 30px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .link-btn {
        display: block;
        background: white;
        color: #0b3d21;
        padding: 16px;
        margin: 15px 0;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        transition: 0.25s ease;
    }

    .link-btn:hover {
        transform: scale(1.04);
        box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .footer {
        margin-top: 40px;
        font-size: 13px;
        opacity: 0.7;
    }
</style>
</head>

<body>
<div class="container">

    <!-- LOGO -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Sinotruk_logo.png" class="logo" />

    <h1>SINOTRUK Official Links</h1>

    <!-- 按钮区域 -->
    <a class="link-btn" href="https://www.facebook.com/SinotrukGroup/" target="_blank">Facebook</a>
    <a class="link-btn" href="https://www.instagram.com/sinotruk_mexico/" target="_blank">Instagram</a>
    <a class="link-btn" href="https://www.linkedin.com/company/sinotrukméxico/" target="_blank">LinkedIn</a>
    <a class="link-btn" href="https://www.tiktok.com/@sinotruk_mexico" target="_blank">TikTok</a>

    <div class="footer">© SINOTRUK GROUP</div>

</div>
</body>
</html>
