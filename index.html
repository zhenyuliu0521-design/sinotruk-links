<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinotruk México</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: #f9f9f9;
        color: #111;
        text-align: center;
        padding: 20px;
    }
    .header {
        margin-top: 40px;
        font-size: 28px;
        font-weight: 600;
    }
    .subtitle {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
        line-height: 1.6;
    }
    .btn-container {
        max-width: 360px;
        margin: 30px auto;
        text-align: center;
    }
    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a8a1a;
        color: #fff;
        text-decoration: none;
        padding: 14px 20px;
        margin: 12px 0;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        transition: 0.2s;
    }
    .btn:hover {
        background: #155e15;
    }
    .btn img {
        width: 24px;
        height: 24px;
        margin-right: 10px;
    }
    .btn-desc {
        font-size: 12px;
        color: #333;
        margin-top: 4px;
    }
</style>
</head>
<body>

<div class="header">Sinotruk México</div>
<div class="subtitle">Respaldo oficial de SITRAK y HOWO en México 🇲🇽<br>Descubre más en nuestras redes ↓</div>

<div class="btn-container">
    <a class="btn" href="https://www.tiktok.com/@sinotrukmexico" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" alt="TikTok Icon"> TikTok
    </a>
    <div class="btn-desc">Sinotruk México en TikTok</div>

    <a class="btn" href="https://www.instagram.com/sinotruk_mexico/" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram Icon"> Instagram
    </a>
    <div class="btn-desc">Sinotruk México en Instagram</div>

    <a class="btn" href="https://www.facebook.com/SinotrukGroup/" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook Icon"> Facebook
    </a>
    <div class="btn-desc">Sinotruk México en Facebook</div>

    <a class="btn" href="https://www.youtube.com/@Sinotruk_Mexico" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube Icon"> YouTube
    </a>
    <div class="btn-desc">Sinotruk México en YouTube</div>

    <a class="btn" href="https://www.linkedin.com/company/sinotrukméxico/" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn Icon"> LinkedIn
    </a>
    <div class="btn-desc">Sinotruk México en LinkedIn</div>
</div>

</body>
</html>
